<svg xmlns="http://www.w3.org/2000/svg" width="820" height="410" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Drift Above</title>
  <desc id="description">A calming aerial nature experience.</desc>
  <defs>
    <linearGradient id="sky" x1="170" y1="50" x2="1050" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d302c"/>
      <stop offset=".5" stop-color="#123d36"/>
      <stop offset="1" stop-color="#071111"/>
    </linearGradient>
    <linearGradient id="haze" x1="640" y1="214" x2="640" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a4c8ac" stop-opacity=".21"/>
      <stop offset="1" stop-color="#a4c8ac" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur stdDeviation="28"/></filter>
  </defs>
  <rect width="1280" height="640" fill="url(#sky)"/>
  <ellipse cx="850" cy="255" rx="390" ry="130" fill="#b5d7af" opacity=".13" filter="url(#soft)"/>
  <path d="M0 540 160 400l138 83 197-182 161 108 196-239 242 168 186-103v405H0Z" fill="#16483f"/>
  <path d="M0 640V549l184-144 123 119 187-91 156 99 189-159 131 90 123-57 187 107v157Z" fill="#10362f"/>
  <path d="m0 640 0-34 215-120 151 90 112-38 164 102 178-103 159 61 144-129 177 75v95Z" fill="#09251f"/>
  <rect y="348" width="1280" height="280" fill="url(#haze)"/>
  <path d="M0 0h1280v640H0Z" fill="none" stroke="#d5ff79" stroke-opacity=".12" stroke-width="2"/>
  <g fill="#d5ff79" filter="url(#glow)">
    <path d="m963 93 23 23-23 23-23-23Z"/>
    <circle cx="1052" cy="171" r="4"/>
    <circle cx="886" cy="200" r="3" opacity=".75"/>
  </g>
  <g fill="#f4f8e9">
    <text x="104" y="110" font-family="ui-monospace, Cascadia Code, Consolas, monospace" font-size="22" font-weight="600" letter-spacing="5">DRIFT / ABOVE</text>
    <text x="104" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="92" letter-spacing="-4">You are still</text>
    <text x="104" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="92" letter-spacing="-4">becoming.</text>
    <text x="107" y="445" fill="#c4d3c9" font-family="ui-monospace, Cascadia Code, Consolas, monospace" font-size="20" letter-spacing="1">A SMALL PLACE TO BREATHE</text>
  </g>
  <g transform="translate(104 541)">
    <rect width="390" height="2" fill="#d5ff79"/>
    <text y="36" fill="#c0d1c2" font-family="ui-monospace, Cascadia Code, Consolas, monospace" font-size="16" letter-spacing="3">CALMING AERIAL NATURE EXPERIENCE</text>
  </g>
</svg>
